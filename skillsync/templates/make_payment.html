<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HireLink – Make Payment</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
{% load static %}
<link rel="stylesheet" href="{% static 'css/main.css' %}">
<style>
  .payment-page {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: var(--black); padding: 40px 20px;
  }
  .payment-card {
    background: var(--dark); border: 1px solid var(--border);
    border-radius: 20px; padding: 48px 40px;
    width: 100%; max-width: 480px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.4);
  }
  .payment-card .brand {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem; letter-spacing: 1px; margin-bottom: 4px;
    color: var(--yellow);
  }
  .payment-card .brand span { color: var(--white); }
  .payment-card h2 { font-size: 1.4rem; font-weight: 700; margin: 24px 0 4px; color: var(--white); }
  .worker-info {
    background: rgba(245,200,0,0.08); border: 1.5px solid var(--yellow);
    border-radius: 10px; padding: 14px 18px;
    margin: 18px 0 24px;
    display: flex; align-items: center; gap: 14px;
  }
  .worker-avatar {
    width: 46px; height: 46px; border-radius: 50%;
    background: var(--yellow);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 1rem; color: var(--black); flex-shrink: 0;
  }
  .worker-details h4 { margin: 0 0 2px; font-size: 1rem; font-weight: 700; color: var(--white); }
  .worker-details span { font-size: 0.82rem; color: var(--muted); text-transform: capitalize; }
  .mpesa-badge {
    display: flex; align-items: center; gap: 8px;
    background: rgba(46,125,50,0.15); border: 1px solid rgba(46,125,50,0.3);
    border-radius: 8px; padding: 10px 14px;
    font-size: 0.82rem; color: #4caf50; font-weight: 600; margin-bottom: 22px;
  }
  .payment-form-group { margin-bottom: 18px; }
  .payment-form-group label {
    display: block; font-size: 0.85rem; font-weight: 600;
    margin-bottom: 6px; color: var(--muted);
  }
  .payment-form-group input {
    width: 100%; padding: 12px 16px;
    border: 1px solid var(--border); border-radius: 10px;
    font-size: 1rem; font-family: 'DM Sans', sans-serif;
    background: var(--card); color: var(--white);
    outline: none; transition: border 0.2s; box-sizing: border-box;
  }
  .payment-form-group input:focus { border-color: var(--yellow); }
  .payment-form-group input::placeholder { color: var(--muted); }
  .btn-pay {
    width: 100%; padding: 15px;
    background: var(--yellow); color: var(--black);
    font-weight: 700; font-size: 1rem; border: none;
    border-radius: 10px; cursor: pointer;
    font-family: 'DM Sans', sans-serif; transition: all 0.2s;
  }
  .btn-pay:hover { background: var(--yellow-dark); }
  .btn-pay:active { transform: scale(0.98); }
  .btn-pay:disabled { background: #555; color: #999; cursor: not-allowed; }
  .status-msg {
    margin-top: 18px; padding: 14px 18px;
    border-radius: 10px; font-size: 0.9rem; font-weight: 600;
    display: none; text-align: center;
  }
  .status-msg.success { background: rgba(46,125,50,0.15); color: #4caf50; display: block; }
  .status-msg.error   { background: rgba(198,40,40,0.15); color: #ef5350; display: block; }
  .status-msg.loading { background: rgba(245,200,0,0.1); color: var(--yellow); display: block; }
  .back-link {
    display: inline-block; margin-top: 20px;
    font-size: 0.85rem; color: var(--muted); text-decoration: none; transition: color 0.2s;
  }
  .back-link:hover { color: var(--white); }
</style>
</head>
<body>
<div class="payment-page">
  <div class="payment-card">
    <div class="brand">Hire<span>Link</span></div>
    <h2>💳 Complete Payment</h2>

    {% if worker %}
    <div class="worker-info">
      <div class="worker-avatar">{{ worker.full_name|slice:":2"|upper }}</div>
      <div class="worker-details">
        <h4>{{ worker.full_name }}</h4>
        <span>{{ worker.role }}</span>
      </div>
    </div>
    {% endif %}

    <div class="mpesa-badge">📱 Payment via M-Pesa STK Push — check your phone after submitting</div>

    <div class="payment-form-group">
      <label>M-Pesa Phone Number</label>
      <input type="tel" id="phoneInput" placeholder="e.g. 0712345678" maxlength="13"/>
    </div>
    <div class="payment-form-group">
      <label>Amount (KES)</label>
      <input type="number" id="amountInput" placeholder="e.g. 1500" min="1"/>
    </div>

    <input type="hidden" id="workerId" value="{{ worker.id|default:'' }}"/>

    <button class="btn-pay" id="payBtn" onclick="initiatePayment()">Pay with M-Pesa</button>
    <div class="status-msg" id="statusMsg"></div>
    <a href="/" class="back-link">← Back to HireLink</a>
  </div>
</div>

<script>
function getCookie(name) {
  let value = null;
  document.cookie.split(';').forEach(c => {
    const trimmed = c.trim();
    if (trimmed.startsWith(name + '=')) value = decodeURIComponent(trimmed.slice(name.length + 1));
  });
  return value;
}

async function initiatePayment() {
  const phone    = document.getElementById('phoneInput').value.trim();
  const amount   = document.getElementById('amountInput').value.trim();
  const workerId = document.getElementById('workerId').value;
  const btn      = document.getElementById('payBtn');
  const status   = document.getElementById('statusMsg');

  status.className   = 'status-msg';
  status.textContent = '';

  if (!phone || !amount) {
    status.className   = 'status-msg error';
    status.textContent = '⚠️ Please enter both phone number and amount.';
    return;
  }

  btn.disabled       = true;
  btn.textContent    = 'Sending request...';
  status.className   = 'status-msg loading';
  status.textContent = '⏳ Initiating STK Push — please wait...';

  try {
    const res  = await fetch('/stk-push/', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') },
      body: JSON.stringify({ phone, amount, worker_id: workerId }),
    });
    const data = await res.json();
    if (data.success) {
      status.className   = 'status-msg success';
      status.textContent = '✅ ' + data.message;
      btn.textContent    = 'Request Sent!';
    } else {
      status.className   = 'status-msg error';
      status.textContent = '❌ ' + (data.error || 'Something went wrong.');
      btn.disabled       = false;
      btn.textContent    = 'Pay with M-Pesa';
    }
  } catch (err) {
    status.className   = 'status-msg error';
    status.textContent = '❌ Network error. Please try again.';
    btn.disabled       = false;
    btn.textContent    = 'Pay with M-Pesa';
  }
}
</script>
</body>
</html>
